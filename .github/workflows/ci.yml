name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholder so the public client id is defined at build time;
          # real credentials are provided at runtime via the environment.
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ci-placeholder
